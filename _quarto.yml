# Meta
description-meta: "Quarto Academic Website Template adapted by Dr. Gang He"
author-meta: "Bayleigh Baldwin"

website:
  title: "Bayleigh Baldwin"
  image: "https://quarto.org/quarto.png"
  description: "Image of Kansas sunflowers"
 
  navbar:
    background: pink  # You can change the background color here

    left:   # You can comment out all navigation items here if you just like to keep the index page only
    - text: Home
      href: index.qmd
    - text: About
      menu:
        - text: News
          href: posts.qmd#category=news
        - text: Contact
          href: contact.qmd             
    - text: Research
      menu:
        - text: Publications Listing  # Automatically generated from publications.xlsx
          href: pub-listing.qmd
        - text: Publications  # Manually curated list of publications
          href: publications.qmd            
        - text: Selected Papers
          href: posts.qmd#category=paper
    - text: Teaching # Comment the Teaching part out to remove the Teaching page
      href: teaching.qmd


    right: 
      - text: CV
        href: files/july26cv.pdf
      - icon: github
        href: https://github.com/drganghe/quarto-academic-website-template
        target: _blank
      - text: "{{< fa brands bluesky >}}"
        href: https://bsky.app/profile/bayleighbaldwin.bsky.social
        target: _blank      
  
  page-navigation: true
  
  page-footer: 
    left: "[Bayleigh Baldwin](https://github.com/bayleighbaldwin) &copy; <script>document.write(new Date().getFullYear())</script>" 
    center: "Build on [Quarto Academic Website Template](https://github.com/drganghe/quarto-academic-website-template) adapted by [Dr. Gang He](http://drganghe.github.io)"
    right:  
      - icon: github
        href: https://github.com/drganghe/quarto-academic-website-template
        target: _blank
      - text: "{{< fa brands bluesky >}}" 
        href: https://bsky.app/profile/bayleighbaldwin.bsky.social
        target: _blank
   ##   - icon: rss
      ##  href: posts.xml
       ## target: _blank  
  
  search:
    location: navbar
    type: textbox
  
  reader-mode: true

  draft-mode: unlinked
  
  repo-url: https://github.com/bayleighbaldwin/bayleighbaldwin.github.io
#  repo-actions: [edit, issue, source]
  
  open-graph: true
  
  twitter-card: true 
#  card-style: summary      
  
  site-url: "https://bayleighbaldwin.github.io/bayleighbaldwin"
  
##  google-analytics:
  ##  tracking-id: ""  # Please delete or replace with your own tracking ID
  ##  anonymize-ip: true 

bibliography: references.bib  # Add references.bib to the root folder to enable the bibliography function

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    footnotes-hover: true
    code-copy: true
    code-link: true
    code-overflow: wrap
    fig-align: center
    link-external-icon: false
    link-external-newwindow: true
    email-obfuscation: javascript
    link-external-filter: '^(?:http:|https:)\/\/drganghe\.github\.io\/custom'
    include-in-header: "files/includes/_academic.qmd"

